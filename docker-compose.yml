services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./algoflow.db
      CHROMA_PATH: ./.chroma
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
