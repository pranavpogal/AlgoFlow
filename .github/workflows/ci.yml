name: AlgoFlow CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: algoflow-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-and-evals:
    name: Backend tests, lint, and deterministic eval contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest -q

      - name: Run backend lint
        run: ruff check app tests

      - name: Run accepted-baseline evaluation comparison
        run: python -m app.evaluation.cli compare --baseline ../evals/baselines/accepted/current.json --json

      - name: Run ADK routing trajectory eval
        run: python -m app.evaluation.cli run --suite adk_routing

      - name: Run ADK live runtime boundary eval
        run: python -m app.evaluation.cli run --suite adk_live_runtime

      - name: Run ADK tool orchestration eval
        run: python -m app.evaluation.cli run --suite adk_tool_orchestration

      - name: Run semantic tool policy eval
        run: python -m app.evaluation.cli run --suite semantic_tool_policy

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: algoflow-evaluation-artifacts
          path: evals/artifacts/
          if-no-files-found: ignore
          retention-days: 14

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
